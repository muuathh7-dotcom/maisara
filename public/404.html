<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>ميسرة</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Saves the full URL to sessionStorage then redirects to index
      var path = window.location.pathname;
      sessionStorage.setItem('redirect', path + window.location.search + window.location.hash);
      window.location.replace('/');
    </script>
  </head>
  <body></body>
</html>
